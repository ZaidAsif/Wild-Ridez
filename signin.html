<!DOCTYPE html>
<html class="no-js">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Sign In - Wild Ridez</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width">

        <link rel="stylesheet" href="css/font.css">
        <link rel="stylesheet" href="css/theme.css">
        <link rel="stylesheet" href="css/index.css">
    </head>
    <body>

        <div id="noCognitoMessage" class="configMessage" style="display: none;">
            <div class="backdrop"></div>
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title">No Cognito User Pool Configured</h3>
                </div>
                <div class="panel-body">
                    <p>There is no user pool configured in <a href="/js/config.js">/js/config.js</a>. You'll configure this in Module 2 of the workshop.</p>
                </div>
            </div>
        </div>

        <header>
          <a href="/index.html"><img src="images/logo.png" alt="Wild Ridez"></a>
        </header>


        <section class="form-wrap">
            <h1>Sign In</h1>
            <form id="signinForm">
              <input type="email" id="emailInputSignin" placeholder="Email" required>
              <input type="password" id="passwordInputSignin" placeholder="Password" pattern=".*" required>

              <input type="submit" value="Sign in">
            </form>
            <p style="text-align:center;margin-top:1.25rem;color:rgba(255,255,255,0.5);font-size:0.9rem;">
              Don't have an account? <a href="/register.html" style="color:var(--brand-pink);font-weight:700;">Register</a>
            </p>
        </section>

        <script src="js/vendor/jquery-3.1.0.js"></script>
        <script src="js/vendor/bootstrap.min.js"></script>
        <script src="js/vendor/aws-cognito-sdk.min.js"></script>
        <script src="js/vendor/amazon-cognito-identity.min.js"></script>
        <script src="js/config.js"></script>
        <script src="js/cognito-auth.js"></script>
    </body>
</html>
